name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # sccache uses GitHub Actions cache as a shared compiler cache.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  # Pin rcodesign version for reproducibility.
  RCODESIGN_VERSION: "0.29.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build the Apple-Silicon binary. Single-target matrix keeps future
  # expansion (add Intel/Linux) a one-line change.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # xlarge = 12 CPU / 28 GB RAM. Cost is ~equivalent per CPU-minute
          # vs the 3-CPU runner, but wall clock finishes ~4× faster.
          - target: aarch64-apple-darwin
            runner: macos-14-xlarge
            strip_cmd: strip -x

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin ctx --target ${{ matrix.target }}

      - name: sccache stats
        run: sccache --show-stats

      - name: Strip binary
        run: ${{ matrix.strip_cmd }} target/${{ matrix.target }}/release/ctx

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            PKG_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='ctx-cli'))")
            echo "version=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload unsigned binary
        uses: actions/upload-artifact@v4
        with:
          name: ctx-${{ matrix.target }}-unsigned
          path: target/${{ matrix.target }}/release/ctx
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Sign + notarize + publish — all on Linux via rcodesign.
  # rcodesign is a pure-Rust reimplementation of Apple's codesign/notarytool
  # that can sign and notarize Mach-O binaries without needing macOS.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Sign, Notarize, and Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for README, LICENSE)
        uses: actions/checkout@v4

      - name: Download unsigned binary
        uses: actions/download-artifact@v4
        with:
          name: ctx-aarch64-apple-darwin-unsigned
          path: unsigned/

      - name: Install rcodesign
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$URL" -o /tmp/rcodesign.tar.gz
          mkdir -p /tmp/rcodesign
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp/rcodesign --strip-components=1
          sudo install -m 0755 /tmp/rcodesign/rcodesign /usr/local/bin/rcodesign
          rcodesign --version

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: read workspace.package.version from the checked-out tree
            V=$(grep -E '^version = "' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            echo "version=v${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode App Store Connect API key
        shell: bash
        env:
          P8_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p ~/.apple-keys
          echo "$P8_B64" | base64 -d > ~/.apple-keys/AuthKey.p8
          # rcodesign needs a combined JSON bundling the API key + identifiers
          rcodesign --no-config encode-app-store-connect-api-key \
            -o ~/.apple-keys/api-key.json \
            "$ISSUER_ID" \
            "$KEY_ID" \
            ~/.apple-keys/AuthKey.p8

      - name: Decode Developer ID signing cert
        shell: bash
        env:
          P12_B64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          echo "$P12_B64" | base64 -d > ~/.apple-keys/DeveloperID.p12

      - name: Sign binary
        shell: bash
        env:
          P12_PW: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # --code-signature-flags=runtime enables the Hardened Runtime, required
          # for notarization. We pipe the p12 password via file to avoid having
          # it appear in the process argv.
          PW_FILE=$(mktemp)
          printf '%s' "$P12_PW" > "$PW_FILE"
          chmod 600 "$PW_FILE"
          rcodesign --no-config sign \
            --p12-file ~/.apple-keys/DeveloperID.p12 \
            --p12-password-file "$PW_FILE" \
            --code-signature-flags runtime \
            unsigned/ctx
          rm "$PW_FILE"
          # Sanity: rcodesign verifies its own signature
          rcodesign --no-config verify unsigned/ctx

      - name: Zip signed binary for notarization
        shell: bash
        run: |
          set -euo pipefail
          cd unsigned
          zip -9 ../ctx-for-notary.zip ctx

      - name: Submit for notarization and wait
        shell: bash
        run: |
          set -euo pipefail
          # rcodesign polls Apple's REST API until the submission is Accepted
          # or rejected. On this cheap Linux runner ($0.008/min), even a 60-min
          # wait costs <$0.50 worst case.
          rcodesign --no-config notary-submit \
            --api-key-file ~/.apple-keys/api-key.json \
            --wait \
            ctx-for-notary.zip

      - name: Package signed binary as tarball
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="aarch64-apple-darwin"
          ARCHIVE_NAME="ctx-${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist staging
          cp unsigned/ctx staging/
          cp README.md LICENSE staging/
          tar -czf "dist/${ARCHIVE_NAME}" -C staging .
          echo "archive=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create `latest` alias (non-prerelease only)
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-rc"* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-beta"* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-alpha"* ]]; then
            cp "${{ steps.tarball.outputs.archive }}" "ctx-latest-aarch64-apple-darwin.tar.gz"
            echo "created ctx-latest-aarch64-apple-darwin.tar.gz alias"
          else
            echo "skipping latest-* alias (prerelease or workflow_dispatch)"
          fi

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum ctx-*.tar.gz > SHA256SUMS

      - name: Determine release tag and draft flag
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.version.outputs.version }}-rc-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          draft: ${{ steps.release_meta.outputs.draft }}
          generate_release_notes: true
          files: |
            dist/ctx-*.tar.gz
            dist/SHA256SUMS

      - name: Wipe keys
        if: always()
        run: rm -rf ~/.apple-keys
