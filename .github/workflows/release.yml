name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reuse_build_run_id:
        description: "Re-use the 'ctx-aarch64-apple-darwin-unsigned' artifact from a prior build run (skip rebuild). Leave empty to build fresh."
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  # sccache uses GitHub Actions cache as a shared compiler cache.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build the Apple-Silicon binary. Single-target matrix keeps future
  # expansion (add Intel/Linux) a one-line change.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    # Skip the expensive build job when the caller explicitly reuses a prior
    # build artifact. Saves the ~$1 macos-xlarge run while iterating on the
    # release / signing pipeline.
    if: ${{ inputs.reuse_build_run_id == '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # xlarge = 12 CPU / 28 GB RAM.
          - target: aarch64-apple-darwin
            runner: macos-14-xlarge
            strip_cmd: strip -x

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin ctx --target ${{ matrix.target }}

      - name: sccache stats
        run: sccache --show-stats

      - name: Strip binary
        run: ${{ matrix.strip_cmd }} target/${{ matrix.target }}/release/ctx

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            PKG_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='ctx-cli'))")
            echo "version=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload unsigned binary
        uses: actions/upload-artifact@v4
        with:
          name: ctx-${{ matrix.target }}-unsigned
          path: target/${{ matrix.target }}/release/ctx
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Sign + notarize + staple + publish — all on Linux.
  # Uses indygreg/apple-code-sign-action which wraps rcodesign.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Sign, Notarize, and Publish
    needs: build
    if: ${{ always() && (needs.build.result == 'success' || inputs.reuse_build_run_id != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # actions: read is required to download artifacts from a different
      # workflow run (the reuse_build_run_id path).
      actions: read

    steps:
      - name: Checkout (for README, LICENSE)
        uses: actions/checkout@v4

      - name: Download unsigned binary (fresh build)
        if: ${{ inputs.reuse_build_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          name: ctx-aarch64-apple-darwin-unsigned
          path: unsigned/

      - name: Download unsigned binary (reused from prior run ${{ inputs.reuse_build_run_id }})
        if: ${{ inputs.reuse_build_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ctx-aarch64-apple-darwin-unsigned
          path: unsigned/
          run-id: ${{ inputs.reuse_build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make binary executable
        run: chmod +x unsigned/ctx

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            V=$(grep -E '^version = "' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            echo "version=v${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode Developer ID signing cert
        shell: bash
        env:
          P12_B64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          echo "$P12_B64" | base64 -d > cert.p12

      - name: Build App Store Connect API key JSON
        shell: bash
        env:
          P8_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          umask 077
          echo "$P8_B64" | base64 -d > /tmp/AuthKey.p8
          # rcodesign's UnifiedApiKey JSON expects `private_key` to be the
          # base64-encoded DER of the ECDSA key, NOT the raw PEM text.
          # Convert PEM → DER → base64.
          PK_DER_B64=$(openssl pkey -in /tmp/AuthKey.p8 -outform DER 2>/dev/null | base64 -w 0)
          jq -n \
            --arg key_id "$KEY_ID" \
            --arg issuer_id "$ISSUER_ID" \
            --arg pk "$PK_DER_B64" \
            '{key_id: $key_id, issuer_id: $issuer_id, private_key: $pk}' \
            > api-key.json
          chmod 600 api-key.json
          rm /tmp/AuthKey.p8

      # Sign only — rcodesign can't notarize a bare Mach-O directly; it needs
      # a ZIP wrapper. We sign here, then zip + notarize manually below.
      - name: Sign binary
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: unsigned/ctx
          output_path: signed/ctx
          sign: true
          notarize: false
          staple: false
          p12_file: cert.p12
          p12_password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}

      - name: Install rcodesign CLI
        shell: bash
        run: |
          set -euo pipefail
          V="0.28.0"
          URL="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${V}/apple-codesign-${V}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$URL" -o /tmp/rcodesign.tar.gz
          mkdir -p /tmp/rcodesign
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp/rcodesign --strip-components=1
          sudo install -m 0755 /tmp/rcodesign/rcodesign /usr/local/bin/rcodesign
          rcodesign --version

      - name: Zip signed binary for notarization
        shell: bash
        run: |
          set -euo pipefail
          chmod +x signed/ctx
          cd signed && zip -9 ../ctx-notary.zip ctx && cd ..

      - name: Submit to Apple notary service
        shell: bash
        run: |
          set -euo pipefail
          # Bare Mach-O binaries can't be stapled — the notary ticket lives on
          # Apple's servers and Gatekeeper fetches it on first run (requires
          # network). So we just --wait (not --staple).
          rcodesign notary-submit \
            --api-key-file api-key.json \
            --wait \
            ctx-notary.zip

      - name: Package signed binary as tarball
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="aarch64-apple-darwin"
          ARCHIVE_NAME="ctx-${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist staging
          cp signed/ctx staging/
          chmod +x staging/ctx
          cp README.md LICENSE staging/
          tar -czf "dist/${ARCHIVE_NAME}" -C staging .
          echo "archive=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create `latest` alias (non-prerelease only)
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-rc"* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-beta"* ]] \
             && [[ "${GITHUB_REF_NAME}" != *"-alpha"* ]]; then
            cp "${{ steps.tarball.outputs.archive }}" "ctx-latest-aarch64-apple-darwin.tar.gz"
            echo "created ctx-latest-aarch64-apple-darwin.tar.gz alias"
          else
            echo "skipping latest-* alias (prerelease or workflow_dispatch)"
          fi

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum ctx-*.tar.gz > SHA256SUMS

      - name: Determine release tag and draft flag
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.version.outputs.version }}-rc-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          draft: ${{ steps.release_meta.outputs.draft }}
          generate_release_notes: true
          files: |
            dist/ctx-*.tar.gz
            dist/SHA256SUMS

      - name: Wipe secrets from disk
        if: always()
        run: rm -rf cert.p12 api-key.json signed ctx-notary.zip
